<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exeter Pubs</title>
  <meta name="description" content="A curated guide to pubs in Exeter, sorted by distance.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark">🍺</span>
        <div>
          <h1>Exeter Pubs</h1>
          <p class="tagline">A small, opinionated guide</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Location bar -->
    <section class="location-bar">
      <button id="find-me-btn" class="btn-find-me" type="button">
        <span class="icon" aria-hidden="true">📍</span>
        <span id="find-me-text">Find pubs near me</span>
      </button>
      <p id="location-status" class="location-status" hidden></p>
    </section>

    <!-- Search & filter -->
    <section id="filters" class="filters" hidden>
      <div class="filters-header">
        <h3 class="filters-title">Search &amp; filter</h3>
        <div class="filters-meta">
          <span id="filter-count" class="filter-count"></span>
          <button id="clear-filters-btn" class="btn-clear" type="button" hidden>Clear all</button>
          <button id="settings-btn" class="btn-icon" type="button" aria-label="Settings">⚙</button>
        </div>
      </div>

      <div class="search-row">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search by name, address, or note…"
          aria-label="Search pubs"
          autocomplete="off">
        <button id="search-clear-btn" class="search-clear" type="button" aria-label="Clear search" hidden>✕</button>
      </div>

      <div id="filter-chips" class="filter-chips" role="group" aria-label="Tag filters"></div>
    </section>

    <!-- View toggle: Map ↔ List -->
    <div class="view-toggle" role="tablist" aria-label="View toggle">
      <button id="view-map-btn" class="view-tab active" type="button" role="tab" aria-selected="true" aria-controls="view-map">Map</button>
      <button id="view-list-btn" class="view-tab" type="button" role="tab" aria-selected="false" aria-controls="view-list">List</button>
    </div>

    <!-- Map view panel -->
    <section class="view-panel view-active" id="view-map" role="tabpanel" aria-labelledby="view-map-btn">
      <div id="map" aria-label="Map of Exeter pubs"></div>
    </section>

    <!-- List view panel -->
    <section class="view-panel" id="view-list" role="tabpanel" aria-labelledby="view-list-btn">
      <div id="status" class="status" role="status" aria-live="polite">Loading pubs…</div>
      <ul id="pub-list" class="pub-list" aria-label="Pubs in Exeter"></ul>
    </section>

  </main>

  <footer class="app-footer">
    <p>Map and data © OpenStreetMap contributors. Tagged by hand.</p>
  </footer>

  <!-- Review modal -->
  <dialog id="review-dialog" class="dialog" aria-labelledby="review-dialog-title">
    <form method="dialog" class="dialog-form" id="review-form">
      <header class="dialog-header">
        <h2 class="dialog-title" id="review-dialog-title">My notes</h2>
        <p class="dialog-subtitle" id="review-dialog-subtitle">—</p>
      </header>

      <div class="dialog-body">
        <label class="field">
          <span class="field-label">Visit date</span>
          <input type="date" id="review-date" class="field-input" required>
        </label>

        <div class="field">
          <span class="field-label">Rating</span>
          <div class="stars-input" id="review-stars" role="radiogroup" aria-label="Rating">
            <button type="button" class="star" data-value="1" aria-label="1 star">☆</button>
            <button type="button" class="star" data-value="2" aria-label="2 stars">☆</button>
            <button type="button" class="star" data-value="3" aria-label="3 stars">☆</button>
            <button type="button" class="star" data-value="4" aria-label="4 stars">☆</button>
            <button type="button" class="star" data-value="5" aria-label="5 stars">☆</button>
            <button type="button" class="star-clear" id="review-stars-clear" aria-label="Clear rating">Clear</button>
          </div>
        </div>

        <label class="field">
          <span class="field-label">Who I was with <span class="field-hint">— optional</span></span>
          <input type="text" id="review-with" class="field-input" maxlength="80" placeholder="e.g. Sam, the team, solo">
        </label>

        <label class="field">
          <span class="field-label">Notes</span>
          <textarea id="review-notes" class="field-input field-textarea" rows="4" placeholder="What did you think? Anything you want to remember…"></textarea>
        </label>
      </div>

      <footer class="dialog-actions">
        <button type="button" id="review-delete-btn" class="btn btn-ghost btn-danger" hidden>Delete</button>
        <span class="dialog-actions-spacer"></span>
        <button type="button" id="review-cancel-btn" class="btn btn-ghost">Cancel</button>
        <button type="button" id="review-save-btn" class="btn btn-primary">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Settings modal -->
  <dialog id="settings-dialog" class="dialog" aria-labelledby="settings-dialog-title">
    <div class="dialog-form">
      <header class="dialog-header">
        <h2 class="dialog-title" id="settings-dialog-title">My reviews</h2>
        <p class="dialog-subtitle">Reviews are stored only in this browser. Use export to back them up.</p>
      </header>

      <div class="dialog-body">
        <p class="settings-stat" id="settings-stat">—</p>

        <div class="settings-actions">
          <button type="button" id="settings-export-btn" class="btn btn-primary btn-block">Export my reviews (JSON)</button>
          <label class="btn btn-ghost btn-block btn-file">
            Import reviews from JSON
            <input type="file" id="settings-import-input" accept=".json" hidden>
          </label>
          <button type="button" id="settings-wipe-btn" class="btn btn-ghost btn-danger btn-block">Wipe all reviews</button>
        </div>

        <p class="settings-note" id="settings-note" hidden></p>
      </div>

      <footer class="dialog-actions">
        <span class="dialog-actions-spacer"></span>
        <button type="button" id="settings-close-btn" class="btn btn-primary">Done</button>
      </footer>
    </div>
  </dialog>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
